# Render Blueprint: single web service (API + React app)
# Connect this repo in Render → New → Blueprint, or create Web Service and set:
#   Build: npm run build   Start: npm start
# Add env vars in Dashboard: VITE_API_URL=(empty), VITE_SUPABASE_URL, VITE_SUPABASE_ANON_KEY, SUPABASE_URL, SUPABASE_SERVICE_ROLE_KEY
services:
  - type: web
    name: buildwise
    runtime: node
    plan: free
    buildCommand: npm run build
    startCommand: npm start
